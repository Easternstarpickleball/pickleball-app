<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>匹克球團搶位系統</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    body { font-family: Arial, sans-serif; background-color: #f0f2f5; padding: 20px; text-align: center; }
    .card { background: white; max-width: 450px; margin: 20px auto; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    h1 { color: #2e7d32; font-size: 26px; margin-bottom: 10px; }
    .date-title { color: #555; font-size: 18px; margin-bottom: 20px; font-weight: bold; }
    .status-box { background-color: #e8f5e9; color: #1b5e20; padding: 15px; border-radius: 8px; font-size: 18px; margin-bottom: 20px; }
    .session-container { margin: 15px 0; padding: 15px; background: #fdfdfd; border: 1px dashed #ccc; border-radius: 10px; }
    
    /* 按鈕基礎與顏色樣式 */
    .session-btn { display: block; width: 100%; margin: 10px 0; padding: 12px; font-size: 16px; border-radius: 8px; cursor: pointer; color: white; border: none; font-weight: bold; transition: background 0.2s; }
    .session-btn:disabled { background: #ccc !important; cursor: not-allowed; opacity: 0.7; }
    
    /* 246 專屬顏色 */
    .day-tue { background-color: #007bff; } /* 週二：藍色 */
    .day-tue:hover:not(:disabled) { background-color: #0056b3; }

    .day-thu { background-color: #28a745; } /* 週四：綠色 */
    .day-thu:hover:not(:disabled) { background-color: #1e7e34; }

    .day-sat { background-color: #fd7e14; } /* 週六：橘色 */
    .day-sat:hover:not(:disabled) { background-color: #d96302; }

    .day-default { background-color: #6c757d; }
    .day-default:hover:not(:disabled) { background-color: #545b62; }

    .btn-submit { background-color: #ff4757; color: white; border: none; padding: 15px 30px; font-size: 22px; font-weight: bold; border-radius: 10px; cursor: pointer; width: 100%; box-shadow: 0 4px 10px rgba(255, 71, 87, 0.4); margin-top: 15px; }
    .btn-submit:disabled { background: #b2bec3; box-shadow: none; cursor: not-allowed; }
    .user-info { background: #e3f2fd; color: #0d47a1; padding: 10px; border-radius: 8px; margin: 15px 0; font-weight: bold; }
  </style>
</head>
<body>

  <div class="card">
    <h1 id="event-title">匹克球團秒搶報名</h1>
    <div class="date-title">請選擇下方場次</div>

    <div class="status-box">
      剩餘名額：<strong id="seats" style="font-size: 28px; color: #d63031;">--</strong>
    </div>

    <div id="auth-box" style="margin-bottom: 20px;">
      <p style="color: #666; font-size: 14px;">請先驗證會員身份：</p>
      <div id="g_id_onload"
         data-client_id="329337408769-4omaa4c4877335iv5thus8npk64bjbag.apps.googleusercontent.com"
         data-callback="handleCredentialResponse">
      </div>
      <div class="g_id_signin" data-type="standard"></div>
    </div>

    <div id="user-profile" class="user-info" style="display: none;"></div>

    <div id="session-selector" class="session-container">
      <h3 style="margin-top:0; color:#333;">📅 場次清單：</h3>
      <div id="session-buttons">請先登入會員...</div>
    </div>

    <button id="btn-grab" class="btn-submit" onclick="startGrab()" disabled>請先驗證會員身份</button>
  </div>

  <script>
    let selectedSession = null;
    let currentUserEmail = null;

    function handleCredentialResponse(response) {
      const responsePayload = parseJwt(response.credential);
      currentUserEmail = responsePayload.email;

      document.getElementById('auth-box').style.display = 'none';
      const profileBox = document.getElementById('user-profile');
      profileBox.style.display = 'block';
      profileBox.innerText = `👤 認證會員：${responsePayload.name} (${currentUserEmail})`;

      loadSessions();
    }

    function parseJwt(token) {
      var base64Url = token.split('.')[1];
      var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
      var jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
          return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
      }).join(''));
      return JSON.parse(jsonPayload);
    }

    function getDayColorClass(session) {
      const str = (session.name + " " + session.displayDate);
      if (str.includes("二") || str.includes("Tue") || str.includes("週二") || str.includes("星期二")) {
        return "day-tue";
      } else if (str.includes("四") || str.includes("Thu") || str.includes("週四") || str.includes("星期四")) {
        return "day-thu";
      } else if (str.includes("六") || str.includes("Sat") || str.includes("週六") || str.includes("星期六")) {
        return "day-sat";
      }
      return "day-default";
    }

    async function loadSessions() {
      try {
        const res = await fetch('/api/sessions');
        const sessions = await res.json();
        
        const btnContainer = document.getElementById('session-buttons');
        btnContainer.innerHTML = '';

        sessions.forEach(s => {
          const btn = document.createElement('button');
          const dayClass = getDayColorClass(s);
          
          btn.className = `session-btn ${dayClass}`;
          
          if (s.isOpen) {
            btn.innerText = `${s.name} (${s.displayDate}) - 剩餘 ${s.remainingSeats} 位`;
            btn.onclick = () => selectSession(s);
          } else {
            btn.innerText = `🔒 ${s.name} (${s.displayDate}) - ${s.openTimeStr} 開放`;
            btn.disabled = true;
          }
          btnContainer.appendChild(btn);
        });
      } catch (err) {
        document.getElementById('session-buttons').innerText = '❌ 無法連線至伺服器';
      }
    }

    function selectSession(session) {
      selectedSession = session;
      document.getElementById('event-title').innerText = `${session.name}`;
      document.getElementById('seats').innerText = session.remainingSeats;
      
      const grabBtn = document.getElementById('btn-grab');
      grabBtn.disabled = false;
      grabBtn.innerText = `🔥 立即搶位 (${session.displayDate})`;
    }

    async function startGrab() {
      if (!selectedSession || !currentUserEmail) return;

      const res = await fetch('/api/grab', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          sessionId: selectedSession.id,
          userEmail: currentUserEmail  /* 恢復為原本相容後端的參數 */
        })
      });

      const result = await res.json();
      alert(result.message);

      if (result.success) {
        document.getElementById('seats').innerText = result.remainingSeats;
        loadSessions();
      }
    }
  </script>
</body>
</html>
